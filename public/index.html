<!DOCTYPE html>
<html>
<head>
    <title>Գրանցում</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .msg {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .good { background: #d4edda; color: #155724; display: block; }
        .bad { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Գրանցում</h2>
        <div id="msg" class="msg"></div>
        <form id="form">
            <input type="email" id="email" placeholder="Էլ. հասցե" required>
            <input type="password" id="pass" placeholder="Գաղտնաբառ" required>
            <button type="submit">Գրանցվել</button>
        </form>
    </div>

    <script>
        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            
            msg.className = 'msg';
            msg.textContent = 'Գրանցվում է...';
            msg.style.display = 'block';
            
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password: pass })
            });
            
            const data = await res.json();
            msg.className = 'msg ' + (data.success ? 'good' : 'bad');
            msg.textContent = data.message;
            
            if(data.success) setTimeout(() => msg.style.display = 'none', 2000);
        };
    </script>
</body>
</html>
